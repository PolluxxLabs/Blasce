kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "sh -c 'cd /home/runner/workspace/artifacts/api-server && go run .'"

[services.production]

[services.production.build]
args = ["sh", "-c", "cd /home/runner/workspace/artifacts/api-server && go build -o dist/server ."]

[services.production.run]
args = ["artifacts/api-server/dist/server"]

[services.production.run.env]
PORT = "8080"

[services.production.health.startup]
path = "/api/healthz"
