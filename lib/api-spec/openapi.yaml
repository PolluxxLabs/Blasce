openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Blasce Streaming API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: movies
    description: Movies and TV shows
  - name: watchlist
    description: User watchlist
  - name: genres
    description: Content genres
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /content:
    get:
      operationId: listContent
      tags: [movies]
      summary: List all content (movies and TV shows)
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [movie, tv]
        - name: genre
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: featured
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentListResponse"

  /content/{id}:
    get:
      operationId: getContent
      tags: [movies]
      summary: Get a single content item by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Content item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /content/featured/hero:
    get:
      operationId: getFeaturedHero
      tags: [movies]
      summary: Get featured hero content for homepage
      responses:
        "200":
          description: Featured hero content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentDetail"

  /content/trending/now:
    get:
      operationId: getTrending
      tags: [movies]
      summary: Get trending content
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Trending content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentListResponse"

  /genres:
    get:
      operationId: listGenres
      tags: [genres]
      summary: List all genres
      responses:
        "200":
          description: List of genres
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenreListResponse"

  /watchlist:
    get:
      operationId: getWatchlist
      tags: [watchlist]
      summary: Get user watchlist
      parameters:
        - name: sessionId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Watchlist items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentListResponse"
    post:
      operationId: addToWatchlist
      tags: [watchlist]
      summary: Add content to watchlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatchlistRequest"
      responses:
        "200":
          description: Updated watchlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchlistItem"

  /watchlist/{contentId}:
    delete:
      operationId: removeFromWatchlist
      tags: [watchlist]
      summary: Remove content from watchlist
      parameters:
        - name: contentId
          in: path
          required: true
          schema:
            type: integer
        - name: sessionId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Removed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    CastMember:
      type: object
      properties:
        name:
          type: string
        character:
          type: string
        photoUrl:
          type: string
          nullable: true
      required:
        - name
        - character

    Episode:
      type: object
      properties:
        id:
          type: integer
        season:
          type: integer
        episode:
          type: integer
        title:
          type: string
        description:
          type: string
        duration:
          type: integer
        thumbnailUrl:
          type: string
          nullable: true
      required:
        - id
        - season
        - episode
        - title
        - description
        - duration

    Content:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        type:
          type: string
          enum: [movie, tv]
        description:
          type: string
        posterUrl:
          type: string
          nullable: true
        backdropUrl:
          type: string
          nullable: true
        trailerUrl:
          type: string
          nullable: true
        releaseYear:
          type: integer
        rating:
          type: string
        imdbScore:
          type: number
          nullable: true
        rtScore:
          type: integer
          nullable: true
        duration:
          type: integer
          nullable: true
        genres:
          type: array
          items:
            type: string
        featured:
          type: boolean
        trending:
          type: boolean
        trendingRank:
          type: integer
          nullable: true
        seasons:
          type: integer
          nullable: true
        totalEpisodes:
          type: integer
          nullable: true
        streamUrl:
          type: string
          nullable: true
      required:
        - id
        - title
        - type
        - description
        - releaseYear
        - rating
        - genres
        - featured
        - trending

    ContentDetail:
      allOf:
        - $ref: "#/components/schemas/Content"
        - type: object
          properties:
            cast:
              type: array
              items:
                $ref: "#/components/schemas/CastMember"
            episodes:
              type: array
              items:
                $ref: "#/components/schemas/Episode"
          required:
            - cast

    ContentListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Content"
        total:
          type: integer
      required:
        - items
        - total

    Genre:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        iconUrl:
          type: string
          nullable: true
      required:
        - id
        - name
        - slug

    GenreListResponse:
      type: object
      properties:
        genres:
          type: array
          items:
            $ref: "#/components/schemas/Genre"
      required:
        - genres

    WatchlistRequest:
      type: object
      properties:
        contentId:
          type: integer
        sessionId:
          type: string
      required:
        - contentId
        - sessionId

    WatchlistItem:
      type: object
      properties:
        id:
          type: integer
        contentId:
          type: integer
        sessionId:
          type: string
        addedAt:
          type: string
          format: date-time
      required:
        - id
        - contentId
        - sessionId
        - addedAt
